<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>مدير الصيدلية - Pharmacy Manager</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2a9d8f">
    <meta name="description" content="تطبيق لإدارة أدوية الصيدلية - تتبع الصلاحيات والمخزون">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Pharmacy Manager">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/dexie@3.2.3/dist/dexie.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js" defer></script>
    <!-- ✅ Html5-QRCode بدلاً من Quagga القديم -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js" defer></script>
</head>
<body>
    <div class="app-header">
        <div id="appTitle" class="app-title">مدير الصيدلية</div>
        <div style="display: flex; gap: 12px;">
            <button id="notifBtn" class="header-btn notif-btn">🔔<span id="notifBadge" class="badge"></span></button>
            <button id="settingsHeaderBtn" class="header-btn">⚙️</button>
        </div>
    </div>
    <div id="pageContent" class="page-content"></div>

    <!-- نافذة تفاصيل الدواء -->
    <div id="medModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" id="closeMedModal">✖</span>
            <h3>📋 تفاصيل الدواء</h3>
            <div id="medDetail"></div>
            <div class="form-actions" style="margin-top: 20px;">
                <button id="editMedBtn" class="edit-btn">✏️ تعديل</button>
                <button id="addToPharmacyBtn" class="save-btn">➕ إضافة إلى الصيدلية</button>
                <button id="deleteMedBtn" class="delete-btn">🗑️ حذف</button>
                <button id="cancelMedBtn" class="cancel-btn">إغلاق</button>
            </div>
        </div>
    </div>

    <!-- نافذة إضافة/تعديل دواء (صيدلية) -->
    <div id="medFormModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" id="closeMedFormModal">✖</span>
            <h3 id="medFormTitle">إضافة دواء</h3>
            <div class="form-container">
                <div class="form-row"><input type="text" id="medName" placeholder="الاسم التجاري *" class="form-input"></div>
                <div class="form-row"><input type="text" id="scientificName" placeholder="الاسم العلمي" class="form-input"></div>
                <div class="form-row"><input type="text" id="company" placeholder="الشركة" class="form-input"><input type="text" id="origin" placeholder="المنشأ" class="form-input"></div>
                <div class="form-row">
                    <input type="text" id="medCategory" list="medCategoriesList" placeholder="التصنيف" class="form-input">
                    <datalist id="medCategoriesList"></datalist>
                    <button type="button" class="small-btn" onclick="window.addNewCategory('medCategory')">➕ تصنيف جديد</button>
                </div>
                <div class="form-row"><input type="text" id="dosageForm" placeholder="الشكل الدوائي" class="form-input"><input type="text" id="dosage" placeholder="الجرعة" class="form-input"></div>
                <div class="form-row">
                    <label for="medExpiry1">تاريخ الانتهاء 1 *</label>
                    <input type="date" id="medExpiry1" class="form-input">
                    <label for="medExpiry2">تاريخ الانتهاء 2</label>
                    <input type="date" id="medExpiry2" class="form-input">
                    <label for="medExpiry3">تاريخ الانتهاء 3</label>
                    <input type="date" id="medExpiry3" class="form-input">
                </div>
                <div class="form-row"><input type="text" id="medBarcode" placeholder="الباركود" class="form-input"><button type="button" class="small-btn" id="scanBarcodeBtn">📷 مسح باركود</button></div>
                <div class="form-row image-upload"><label class="image-upload-label">📷 اختر صورة<input type="file" id="medImage" accept="image/*" style="display: none;"></label><div id="imagePreview" class="image-preview"></div></div>
                <div class="form-actions"><button id="submitMedBtn" class="save-btn">حفظ</button><button id="cancelMedFormBtn" class="cancel-btn">إلغاء</button></div>
            </div>
        </div>
    </div>

    <!-- نافذة إضافة دواء عام -->
    <div id="generalFormModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" id="closeGeneralFormModal">✖</span>
            <h3 id="generalFormTitle">إضافة دواء (عام)</h3>
            <div class="form-container">
                <div class="form-row"><input type="text" id="genName" placeholder="الاسم التجاري *" class="form-input"></div>
                <div class="form-row"><input type="text" id="genScientificName" placeholder="الاسم العلمي" class="form-input"></div>
                <div class="form-row"><input type="text" id="genCompany" placeholder="الشركة" class="form-input"><input type="text" id="genOrigin" placeholder="المنشأ" class="form-input"></div>
                <div class="form-row">
                    <input type="text" id="genCategory" list="genCategoriesList" placeholder="التصنيف" class="form-input">
                    <datalist id="genCategoriesList"></datalist>
                    <button type="button" class="small-btn" onclick="window.addNewCategory('genCategory')">➕ تصنيف جديد</button>
                </div>
                <div class="form-row"><input type="text" id="genDosageForm" placeholder="الشكل الدوائي" class="form-input"><input type="text" id="genDosage" placeholder="الجرعة" class="form-input"></div>
                <div class="form-row"><input type="text" id="genBarcode" placeholder="الباركود" class="form-input"><button type="button" class="small-btn" id="scanBarcodeGenBtn">📷 مسح باركود</button></div>
                <div class="form-row image-upload"><label class="image-upload-label">📷 اختر صورة<input type="file" id="genImage" accept="image/*" style="display: none;"></label><div id="genImagePreview" class="image-preview"></div></div>
                <div class="form-actions"><button id="submitGeneralBtn" class="save-btn">حفظ الدواء</button><button id="cancelGeneralFormBtn" class="cancel-btn">إلغاء</button></div>
            </div>
        </div>
    </div>

    <!-- نافذة مسح الباركود -->
    <div id="barcodeScannerModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" id="closeScannerModal">✖</span>
            <h3>📷 مسح الباركود</h3>
            <!-- ✅ div بدلاً من video — Html5-QRCode تحتاج div -->
            <div id="scannerVideo" style="width:100%; border-radius:16px; overflow:hidden;"></div>
            <div id="scannerResult" style="margin-top:10px; text-align:center; font-size:14px;"></div>
            <div style="display: flex; gap: 8px; margin-top: 12px; justify-content: center;">
                <button id="manualBarcodeBtn" class="small-btn" style="display:none;">📝 إدخال يدوي</button>
                <button id="cancelScannerBtn" class="cancel-btn">إلغاء</button>
            </div>
        </div>
    </div>

    <!-- نافذة الإعدادات -->
    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" id="closeSettingsModal">✖</span>
            <h3>⚙️ الإعدادات</h3>
            <div id="settingsContent"></div>
        </div>
    </div>

    <!-- نافذة تأكيد الخروج -->
    <div id="exitConfirmModal" class="modal">
        <div class="modal-content" style="max-width: 350px;">
            <h3>تأكيد الخروج</h3>
            <p style="margin: 20px 0;">هل تريد الخروج من التطبيق؟</p>
            <div style="display: flex; gap: 12px; justify-content: center;">
                <button id="confirmExitBtn" class="save-btn">نعم</button>
                <button id="cancelExitBtn" class="cancel-btn">إلغاء</button>
            </div>
        </div>
    </div>

    <!-- نافذة حفظ التغييرات -->
    <div id="saveChangesModal" class="modal">
        <div class="modal-content" style="max-width: 350px;">
            <h3>تأكيد</h3>
            <p style="margin: 20px 0;">هل تريد حفظ التغييرات قبل الخروج؟</p>
            <div style="display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;">
                <button id="saveAndExitBtn" class="save-btn">حفظ وخروج</button>
                <button id="exitWithoutSaveBtn" class="cancel-btn">خروج بدون حفظ</button>
                <button id="cancelSaveExitBtn" class="save-btn" style="background: var(--primary);">إلغاء</button>
            </div>
        </div>
    </div>

    <!-- نافذة التحميل -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-spinner"></div>
        <div id="loadingText" class="loading-text">جاري التحميل...</div>
    </div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js')
                .then(reg => console.log('SW registered:', reg))
                .catch(err => console.log('SW failed:', err));
        }
        // ✅ ربط زر الحذف بدون inline onclick
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('deleteMedBtn')?.addEventListener('click', () => {
                if (window.deleteCurrentMed) window.deleteCurrentMed();
            });
        });
    </script>
</body>
</html>
