<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>غير متصل</title><style>body{font-family:sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;display:flex;justify-content:center;align-items:center;margin:0;padding:20px}.card{background:white;border-radius:32px;padding:40px 24px;text-align:center;max-width:400px;box-shadow:0 20px 40px rgba(0,0,0,0.2)}.icon{font-size:80px}h1{color:#333}p{color:#666;margin:20px 0}.btn{background:#2a9d8f;color:white;border:none;border-radius:40px;padding:12px 28px;font-size:18px;cursor:pointer}.features{margin-top:30px;font-size:14px;color:#555}</style></head>
