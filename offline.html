<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>غير متصل - مدير الصيدلية</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .offline-container {
            text-align: center;
            background: white;
            border-radius: 24px;
            padding: 40px 20px;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .offline-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        h1 {
            color: #2a9d8f;
            margin-bottom: 16px;
        }
        p {
            color: #555;
            margin-bottom: 24px;
            line-height: 1.6;
        }
        button {
            background: #2a9d8f;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 40px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #21867a;
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">📡</div>
        <h1>لا يوجد اتصال بالإنترنت</h1>
        <p>يرجى التحقق من اتصالك بالشبكة والمحاولة مرة أخرى.<br>بعض البيانات قد تكون غير متاحة حالياً.</p>
        <button onclick="location.reload()">إعادة المحاولة</button>
    </div>
</body>
</html>
